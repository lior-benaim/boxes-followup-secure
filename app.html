    dropResultRowHTML(item,data,shipNames,date,`addItemToThisDrop('${item}','${date}')`,`removeItemFromThisDrop('${item}')`)
  ).join('');
}

async function addItemToThisDrop(item,date){
  await db.ref('dropDates/'+fkey(item)).set(date);
  await db.ref('dropDateList/'+date).set(true);
  notify('✓ '+item+' נוסף לדרופ '+formatDate(date)+' (עודכן גם ב-Storage Locations)');
  // dropDates listener re-renders + restores focus to the card search
}

async function removeItemFromThisDrop(item){
  await db.ref('dropDates/'+fkey(item)).remove();
  notify('✓ '+item+' הוסר מהדרופ');
}

async function deleteEmptyDrop(date){
  if(!confirm('למחוק את הדרופ של '+formatDate(date)+'?'))return;
  await db.ref('dropDateList/'+date).remove();
  if(dropCardAddOpen===date)dropCardAddOpen=null;
  notify('✓ דרופ נמחק');
  renderDrops();
}

// ===== Manual item (no PL) =====
function toggleDropCardManual(date){
  if(dropCardManualOpen===date){dropCardManualOpen=null;}
  else{dropCardManualOpen=date;dropsExpanded[date]=true;}
  renderDrops();
}

function renderDropCardManualForm(date){
  const fdate=fkey(date);
  return `<div style="margin-top:10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px">
    <div style="font-size:13px;font-weight:700;color:#c2410c;margin-bottom:8px">➕ הוספת פריט ללא PL</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <input type="text" id="manual-code-${fdate}" placeholder="קוד פריט (לדוג׳ ADD0187)"
        style="flex:1;min-width:140px;border:1.5px solid #fed7aa;border-radius:8px;padding:7px 10px;font-size:13px;outline:none"
        onkeydown="if(event.key==='Enter')document.getElementById('manual-name-${fdate}').focus()">
      <input type="text" id="manual-name-${fdate}" placeholder="שם פריט (אופציונלי)"
        style="flex:1;min-width:140px;border:1.5px solid #fed7aa;border-radius:8px;padding:7px 10px;font-size:13px;outline:none"
        onkeydown="if(event.key==='Enter')addManualItemToDrop('${date}')">
    </div>
    <button onclick="addManualItemToDrop('${date}')"
      style="background:#c2410c;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;font-weight:700">
      + הוסף לדרופ
    </button>
  </div>`;
}

async function addManualItemToDrop(date){
  const fdate=fkey(date);
  const codeEl=document.getElementById('manual-code-'+fdate);
  const nameEl=document.getElementById('manual-name-'+fdate);
  if(!codeEl)return;
  const item=codeEl.value.trim().toUpperCase();
  const styleName=nameEl?nameEl.value.trim():'';
  if(!item){notify('נא להזין קוד פריט','error');return;}

  // Save to manualItems (only if not already in a real shipment)
  const allItems=getAllItemsAcrossShipments();
  if(allItems[item]&&!allItems[item].isManual){
    // Item exists in a real PL — just add to drop directly
    await db.ref('dropDates/'+fkey(item)).set(date);
    await db.ref('dropDateList/'+date).set(true);
    notify('✓ '+item+' נמצא ב-PL ונוסף לדרופ אוטומטית!');
  } else {
    // Save as manual item
    await db.ref('manualItems/'+fkey(item)).set({item,styleName:styleName||item});
    await db.ref('dropDates/'+fkey(item)).set(date);
    await db.ref('dropDateList/'+date).set(true);
    notify('✓ '+item+' נוסף לדרופ (ללא PL)');
  }
  if(codeEl)codeEl.value='';
  if(nameEl)nameEl.value='';
}

async function removeManualItem(item){
  if(!confirm('להסיר את '+item+' מהמערכת לגמרי (כולל מהדרופ)?'))return;
  await db.ref('manualItems/'+fkey(item)).remove();
  await db.ref('dropDates/'+fkey(item)).remove();
  notify('✓ '+item+' הוסר');
}

function renderDrops(){
  const completed=getItemsWithDropDates();
  const el=document.getElementById('drops-list');

  // Group items by drop date
  const byDate={};
  completed.forEach(({item,data,shipNames})=>{
    const date=dropDates[fkey(item)];
    if(!date)return;
    if(!byDate[date])byDate[date]=[];
    byDate[date].push({item,data,shipNames});
  });

  // Merge in empty drop dates (created via "Save") so they show even with 0 items
  const allDates=new Set([...Object.keys(byDate),...Object.keys(dropDateList||{})]);
  const dates=[...allDates].sort();
  document.getElementById('drops-subtitle').textContent=dates.length+' drop dates';

  if(dates.length===0){
    el.innerHTML=`<div class="loc-empty">
      <div class="loc-empty-icon">📅</div>
      <div class="loc-empty-title">עדיין אין דרופים</div>
      <div class="loc-empty-sub">לחצי על "➕ הוסף לדרופ" כדי ליצור דרופ חדש</div>
    </div>`;
    return;
  }

  el.innerHTML=dates.map(date=>{
    const items=byDate[date]||[];
    const women=items.filter(({item})=>!item.startsWith('LADD'));
    const kids=items.filter(({item})=>item.startsWith('LADD'));
    const total=items.length;
    // Empty drops open by default so items can be added immediately
    let expanded=dropsExpanded[date];
    if(expanded===undefined)expanded=(total===0);

    const renderSection=(list,title,emoji,borderTop)=>{
      if(list.length===0)return'';
      return `<div class="drops-section-title" style="${borderTop?'border-top:2px solid #f0f0f0;margin-top:4px':''}">${emoji} ${title} (${list.length})</div>`+
        list.map(({item,data,shipNames})=>{
          const colors=[...new Set(data.entries.map(e=>e.color).filter(Boolean))].sort();
          const imgKey=fkey(item);
          const img=dropImages[imgKey]||'';
          const imgOpen=dropsExpanded['img_'+item]===true;
          const isManual=shipNames&&shipNames.length===1&&shipNames[0]==='עדיין אין PL';
          const badgeHtml=isManual
            ? `<span style="font-size:10px;color:#c2410c;background:#fff7ed;border:1px solid #fed7aa;border-radius:4px;padding:2px 6px;font-weight:600">עדיין אין PL</span>`
            : shipBadges(shipNames);
          return `<div>
            <div class="drops-item-row">
              <div style="flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer" onclick="toggleDropItem('${item}')">
                <span class="drops-item-code">${item}</span>
                <span class="drops-item-name">${data.styleName||''}</span>
                ${colors.length?`<span class="drops-item-colors">${colors.join(' · ')}</span>`:''}
                ${badgeHtml}
                ${img?'<span style="font-size:11px;color:#7c3aed;font-weight:600">📷</span>':''}
                <span style="font-size:11px;color:#ccc">${imgOpen?'▲':'▼'}</span>
              </div>
              <button onclick="event.stopPropagation();removeItemFromDrop('${item}')" style="background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:#dc2626;white-space:nowrap;flex-shrink:0">✕ הסר</button>
            </div>
            ${imgOpen?`<div class="drop-img-section">
              ${img?`<img class="drop-img-preview" src="${img}" alt="${item}">`:
                '<div style="font-size:12px;color:#aaa;margin-bottom:8px">אין תמונה עדיין</div>'}
              <div class="drop-img-btns">
                <button class="btn-upload-img" onclick="uploadDropImage('${item}')">📷 ${img?'החלף תמונה':'הוסף תמונה'}</button>
                ${img?`<button class="btn-remove-img" onclick="removeDropImage('${item}')">🗑 הסר</button>`:''}
                ${img?`<span class="drop-img-saved">✓ תמונה שמורה</span>`:''}
              </div>
            </div>`:''}
          </div>`;
        }).join('');
    };

    const cardAddOpen=dropCardAddOpen===date;
    const cardManualOpen=dropCardManualOpen===date;
    const addArea=`<div style="padding:10px 16px;border-top:1px solid #f0f0f0;background:#faf9ff">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="toggleDropCardAdd('${date}')" style="background:${cardAddOpen?'#ede9fe':'#7c3aed'};color:${cardAddOpen?'#7c3aed':'#fff'};border:1px solid #7c3aed;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600">${cardAddOpen?'✕ סגור חיפוש':'➕ הוסף פריט לדרופ הזה'}</button>
          <button onclick="toggleDropCardManual('${date}')" style="background:${cardManualOpen?'#fff7ed':'#c2410c'};color:${cardManualOpen?'#c2410c':'#fff'};border:1px solid #fed7aa;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600">${cardManualOpen?'✕ סגור':'📝 הוסף פריט ללא PL'}</button>
        </div>
        ${cardAddOpen?`<div style="margin-top:10px">
          <input type="text" id="drop-card-search-${fkey(date)}" placeholder="חיפוש פריט מכל המשלוחים (קוד / שם)..." value="${dropCardAddSearch}"
            oninput="dropCardAddSearch=this.value;renderDropCardResults('${date}')"
            style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;margin-bottom:8px">
          <div id="drop-card-results-${fkey(date)}"></div>
        </div>`:''}
        ${cardManualOpen?renderDropCardManualForm(date):''}
      </div>`;

    return `<div class="drops-date-card">
      <div class="drops-date-header" onclick="dropsExpanded['${date}']=!(${expanded});renderDrops()">
        <div>
          <div class="drops-date-title">${formatDate(date)}</div>
          <div class="drops-date-count">${total} styles${women.length?(' · '+women.length+' women'):''}${kids.length?(' · '+kids.length+' kids'):''}</div>
        </div>
        <span style="font-size:12px;color:#ccc">${expanded?'▲':'▼'}</span>
      </div>
      ${expanded?`<div class="drops-date-body">
        ${total===0?'<div style="padding:10px 16px;font-size:13px;color:#aaa">אין עדיין פריטים בדרופ הזה — הוסיפי דרך הכפתור למטה.</div>':''}
        ${renderSection(women,'Women','👩',false)}
        ${renderSection(kids,'Kids','👧',women.length>0)}
        ${addArea}
        ${total===0?`<div style="padding:0 16px 12px"><button onclick="deleteEmptyDrop('${date}')" style="background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;color:#dc2626">🗑 מחק דרופ ריק</button></div>`:''}
      </div>`:''}
    </div>`;
  }).join('');

  // Restore focus to the open card's search input after a full rebuild
  if(dropCardAddOpen){
    const inp=document.getElementById('drop-card-search-'+fkey(dropCardAddOpen));
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);renderDropCardResults(dropCardAddOpen);}
  }
}

function setPrefixFilter(p){
  prefixFilter=p;
  render();
}

function togglePrefixPopup(e){
  e.stopPropagation();
  const pop=document.getElementById('prefix-popup');
  if(pop)pop.className='prefix-popup'+(pop.classList.contains('open')?'':' open');
}
function closePrefixPopup(){
  const pop=document.getElementById('prefix-popup');
  if(pop)pop.className='prefix-popup';
}
document.addEventListener('click',()=>closePrefixPopup());

function render(){
  const entries=getCurrentEntries();
  const ctnMap=groupByCTN(entries);
  const itemMap=groupByItem(entries);
  allEntriesByCtn=ctnMap;

  // Sort: pending+unopened first, confirmed opened last
  const allCtns=Object.keys(ctnMap).sort();
  const pending=allCtns.filter(c=>pendingOpened[c]&&!openedCtns[c]);
  const unopened=allCtns.filter(c=>!openedCtns[c]&&!pendingOpened[c]);
  const opened=allCtns.filter(c=>openedCtns[c]);
  const sortedCtns=[...pending,...unopened,...opened];

  const openedCount=allCtns.filter(c=>openedCtns[c]).length;
  const totalQty=entries.reduce((s,e)=>s+e.qty,0);

  // Completed badge
  const completedCount=getCompletedItems().length;
  const pendingLocCount=getPendingLocationCount();
  const btnLoc=document.getElementById('btn-locations');
  const badge=document.getElementById('locations-badge');
  const btnDrops=document.getElementById('btn-drops');
  if(completedCount>0){
    btnLoc.style.display='flex';
    badge.textContent=pendingLocCount>0?pendingLocCount:'✓';
    badge.style.background=pendingLocCount>0?'#ef4444':'#16a34a';
  } else {
    btnLoc.style.display='none';
  }
  // Drops button is ALWAYS available once a shipment is loaded,
  // even if the active shipment has no items assigned to a drop.
  if(btnDrops)btnDrops.style.display=activeShipment?'flex':'none';
  const btnOnline=document.getElementById('btn-online');
  if(btnOnline)btnOnline.style.display=activeShipment?'flex':'none';
  const btnExport=document.getElementById('btn-export-main');
  if(btnExport)btnExport.style.display=activeShipment?'flex':'none';

  // Shipment selector
  const keys=Object.keys(shipments);
  const shipBar=document.getElementById('shipment-bar');
  const shipSel=document.getElementById('shipment-select');
  if(keys.length>0){
    shipBar.style.display='flex';
    shipSel.innerHTML=keys.map(id=>`<option value="${id}" ${activeShipment===id?'selected':''}>${shipments[id].name} (${shipments[id].date})</option>`).join('');
  } else {
    shipBar.style.display='none';
  }

  if(!activeShipment){
    document.getElementById('stats-bar').style.display='none';
    document.getElementById('search-section').style.display='none';
    document.getElementById('list-header').style.display='none';
    document.getElementById('main-list').innerHTML=`<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Upload a PL file to get started</div>
      <div class="empty-sub">Excel file in XLS or XLSX format</div>
    </div>`;
    return;
  }

  // Stats
  const pct=allCtns.length>0?Math.round(openedCount/allCtns.length*100):0;
  const kidsCtns=allCtns.filter(c=>ctnMap[c].some(e=>e.item.startsWith('LADD')));
  const womenCtns=allCtns.filter(c=>ctnMap[c].some(e=>e.item.startsWith('ADD')));
  const kidsItems=new Set(entries.filter(e=>e.item.startsWith('LADD')).map(e=>e.item)).size;
  const womenItems=new Set(entries.filter(e=>e.item.startsWith('ADD')).map(e=>e.item)).size;
  // Prefix breakdown
  const prefixMap={};
  allCtns.forEach(c=>{
    const m=c.match(/^([A-Za-z]+)/);
    if(m){const p=m[1].toUpperCase();if(!prefixMap[p]){prefixMap[p]=[];}prefixMap[p].push(c);}
  });
  const prefixes=Object.keys(prefixMap).sort();
  const multiPrefix=prefixes.length>1;

  // Update popup in header
  const wrapEl=document.getElementById('prefix-popup-wrap');
  const simpleEl=document.getElementById('header-icon-simple');
  if(multiPrefix&&wrapEl&&simpleEl){
    wrapEl.style.display='flex';
    simpleEl.style.display='none';
    document.getElementById('prefix-badge').textContent=prefixes.length;
    document.getElementById('prefix-popup-rows').innerHTML=prefixes.map(p=>{
      const nums=prefixMap[p].map(c=>parseInt(c.replace(/[^0-9]/g,''))).filter(n=>!isNaN(n));
      const mn=Math.min(...nums),mx=Math.max(...nums);
      return `<div class="prefix-popup-row">
        <span class="prefix-popup-name">${p}</span>
        <span class="prefix-popup-range">${prefixMap[p].length} קרטונים · ${mn}–${mx}</span>
      </div>`;
    }).join('');
    document.getElementById('prefix-popup-btns').innerHTML=
      `<button onclick="setPrefixFilter('');closePrefixPopup()" style="padding:3px 10px;font-size:11px;border-radius:5px;border:1px solid ${prefixFilter===''?'#1a1a1a':'#ddd'};background:${prefixFilter===''?'#1a1a1a':'#f5f5f5'};color:${prefixFilter===''?'#fff':'#555'};cursor:pointer;font-weight:600">הכל</button>`+
      prefixes.map(p=>`<button onclick="setPrefixFilter('${p}');closePrefixPopup()" style="padding:3px 10px;font-size:11px;border-radius:5px;border:1px solid ${prefixFilter===p?'#1a1a1a':'#ddd'};background:${prefixFilter===p?'#1a1a1a':'#f5f5f5'};color:${prefixFilter===p?'#fff':'#555'};cursor:pointer;font-weight:600">${p}</button>`).join('');
  } else if(wrapEl&&simpleEl){
    wrapEl.style.display='none';
    simpleEl.style.display='';
  }



  // We need ctnsToShow for the count — compute prefix-filtered count
  const filteredCtnsCount=prefixFilter?allCtns.filter(c=>c.toUpperCase().startsWith(prefixFilter.toUpperCase())).length:allCtns.length;
  const totalCardInnerFinal=`<div class="stat-label">Total Cartons${prefixFilter?` · <span style="color:#7c3aed;font-size:10px">${prefixFilter}</span>`:''}</div><div class="stat-value">${filteredCtnsCount}${prefixFilter?`<span class="stat-sub"> / ${allCtns.length}</span>`:''}</div>`;

  document.getElementById('stats-bar').style.display='grid';
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card">${totalCardInnerFinal}</div>
    <div class="stat-card" style="cursor:pointer" onclick="openStatsPanel('kids')"><div class="stat-label">👧 Kids <span style="font-size:10px;color:#bbb">▼</span></div><div class="stat-value">${kidsCtns.length}<span class="stat-sub"> (${kidsItems} styles)</span></div></div>
    <div class="stat-card" style="cursor:pointer" onclick="openStatsPanel('women')"><div class="stat-label">👩 Women <span style="font-size:10px;color:#bbb">▼</span></div><div class="stat-value">${womenCtns.length}<span class="stat-sub"> (${womenItems} styles)</span></div></div>
    <div class="stat-card progress-card green" style="cursor:pointer" onclick="openStatsPanel('opened')">
      <div class="stat-label">Opened <span style="font-size:10px;color:#bbb">▼</span></div>
      <div class="stat-value">${openedCount}<span class="stat-sub"> / ${allCtns.length}</span></div>
      <div class="stat-progress-bar"><div class="stat-progress-fill" style="width:${pct}%"></div></div>
    </div>`;

  document.getElementById('search-section').style.display='block';
  document.getElementById('list-header').style.display='block';

  // Restore search input value
  const inp=document.getElementById('search-input');
  if(inp&&inp.value!==searchQuery){inp.value=searchQuery;}
  document.getElementById('clear-btn').style.display=searchQuery?'block':'none';
  // Show "Search All Shipments" only when query + multiple shipments
  const allShipRow=document.getElementById('search-all-row');
  if(allShipRow){
    const multiShip=Object.keys(shipments).length>1;
    allShipRow.style.display=(searchQuery&&multiShip)?'flex':'none';
  }

  const listEl=document.getElementById('main-list');
  const countEl=document.getElementById('list-count');

  if(searchQuery&&searchMode==='item'){
    const q=searchQuery.toLowerCase();
    let matches=Object.entries(itemMap).filter(([item,v])=>item.toLowerCase().includes(q)||v.styleName.toLowerCase().includes(q));
    if(categoryFilter!=='all')matches=matches.filter(([item])=>categoryMatch(item));
    countEl.textContent=matches.length+' styles found';
    if(matches.length===0){listEl.innerHTML='<div class="no-results">No matching styles found</div>';return;}
    listEl.innerHTML=matches.map(([item,data])=>renderItemCard(item,data)).join('');
    return;
  }

  let ctnsToShow=sortedCtns;
  if(prefixFilter) ctnsToShow=ctnsToShow.filter(c=>c.toUpperCase().startsWith(prefixFilter.toUpperCase()));
  if(searchQuery&&searchMode==='ctn') ctnsToShow=ctnsToShow.filter(c=>c.toLowerCase().includes(searchQuery.toLowerCase()));
  if(categoryFilter!=='all') ctnsToShow=ctnsToShow.filter(c=>ctnMap[c].some(e=>categoryMatch(e.item)));
  if(multiStyleFilter) ctnsToShow=ctnsToShow.filter(c=>isMultiStyleCarton(ctnMap[c]));
  countEl.textContent=(searchQuery||categoryFilter!=='all'||multiStyleFilter)?ctnsToShow.length+' cartons found':allCtns.length+' Cartons';
  if(ctnsToShow.length===0){listEl.innerHTML='<div class="no-results">No matching cartons found</div>';return;}
  listEl.innerHTML=ctnsToShow.map(ctn=>renderCTNCard(ctn,ctnMap[ctn])).join('');
  if(typeof updateScrollButtons==='function')updateScrollButtons();
}

function itemHasLocation(itemCode){
  const key=fkey(itemCode);
  if(!locations[key])return false;
  return Object.values(locations[key]).some(v=>v);
}

function renderCTNCard(ctn,items,shipmentName){
  const opened=!!openedCtns[ctn];
  const pending=!!pendingOpened[ctn];
  const expanded=expandedCards[ctn]===true;
  const totalQty=items.reduce((s,i)=>s+i.qty,0);
  const styleNames=[...new Set(items.map(i=>i.styleName||i.item))];
  const previewText=styleNames.join(' · ');
  const uniqueStyleCodes=[...new Set(items.map(i=>i.item))];
  const isMulti=uniqueStyleCodes.length>1;
  let cardClass=opened?'opened':pending?'pending':'';
  if(isMulti)cardClass+=' multi-style';
  // Check if any item in this carton has a location
  const hasLocItems=items.filter(i=>itemHasLocation(i.item));
  const hasLoc=hasLocItems.length>0;
  let html=`<div class="ctn-card ${cardClass}">
    <div class="ctn-header" onclick="toggleExpand('${ctn}')">
      <button class="check-btn ${opened||pending?'checked':''}" style="${pending&&!opened?'background:#e8f5e9;border-color:#4caf50;color:#2e7d32':''}" onclick="event.stopPropagation();toggleCTN('${ctn}')">${opened?'✓':pending?'✓':''}</button>
      <span class="ctn-number">${ctn}</span>
      <span class="ctn-style-name">${previewText}</span>
      ${shipmentName?`<span class="all-ship-badge">${shipmentName}</span>`:''}
      ${opened?'<span class="badge-open">Opened ✓</span>':''}
      ${hasLoc&&!opened?`<span class="badge-has-loc">📍 Has locations</span>`:''}
      ${isMulti?`<span class="badge-multi-style">⚠ ${uniqueStyleCodes.length} styles in this carton</span>`:''}
      <span class="ctn-meta">${totalQty} pcs</span>
      <span class="chevron ${expanded?'open':''}">▼</span>
    </div>`;
  if(expanded){
    html+=`<div class="ctn-body"><table>
      <thead><tr><th>Style Code</th><th>Color</th><th>Sizes</th><th>Qty</th></tr></thead><tbody>`+
      items.map(item=>{
        const hasItemLoc=itemHasLocation(item.item);
        const locText=hasItemLoc?` <span style="font-size:10px;color:#d97706">📍</span>`:'';
        return `<tr class="${hasItemLoc?'has-loc-row':''}">
          <td><div class="item-code">${item.item}${locText}</div>${item.styleName?`<div class="item-sname">${item.styleName}</div>`:''}</td>
          <td>${item.color}</td>
          <td class="sizes-cell">${Object.entries(item.sizes).map(([s,q])=>`${s}:${q}`).join(' ')}</td>
          <td class="qty-cell">${item.qty}</td>
        </tr>`;
      }).join('')+`</tbody></table></div>`;
  }
  return html+'</div>';
}

function renderItemCard(item,data,shipmentName){
  const ctns=[...data.ctns].sort();
  const totalQty=data.entries.reduce((s,e)=>s+e.qty,0);
  const expanded=expandedCards['item_'+item]===true;
  const allOpened=ctns.every(c=>openedCtns[c]);
  // Check if this style has locations
  const itemKey=fkey(item);
  const hasLoc=locations[itemKey]&&Object.values(locations[itemKey]).some(v=>v);
  const locColors=hasLoc?Object.entries(locations[itemKey]).filter(([k,v])=>v).map(([k,v])=>`${k.replace('loc','Location ')}: ${v}`).join(' · '):'';
  let html=`<div class="item-card ${hasLoc?'item-has-loc':''}">`;
  if(hasLoc){
    html+=`<div class="location-banner">📍 This style has saved locations: ${locColors}</div>`;
  }
  html+=`<div class="item-header" onclick="toggleExpand('item_${item}')">
      <div style="flex:1;min-width:0">
        <div class="item-title">${data.styleName||item}</div>
        <div class="item-sub">${item} · ${ctns.length} cartons · ${totalQty} pcs${shipmentName?` · <span style="color:#1d4ed8">${shipmentName}</span>`:''}</div>
      </div>
      <span class="chevron ${expanded?'open':''}">▼</span>
    </div>`;
  if(expanded){
    html+=`<div class="item-actions" data-item="${item}" data-ctns="${[...data.ctns].join(',')}">
      <button class="btn-mark-all" onclick="markFromParent(this,true)">✓ Mark All Cartons</button>
      <button class="btn-mark-all" style="background:#666" onclick="markFromParent(this,false)">↩ Unmark All</button>
      <button class="btn-done" onclick="doneFromParent(this)">✅ Done → Storage</button>
    </div>
    <div class="ctn-chips">`+ctns.map(ctn=>{
      const isOpen=!!openedCtns[ctn];
      const isPending=!!pendingOpened[ctn];
      const colors=data.entries.filter(e=>e.ctn===ctn).map(e=>e.color).filter(Boolean).join(', ');
      const fullCtnItems=allEntriesByCtn[ctn]||data.entries.filter(e=>e.ctn===ctn);
      const isMultiChip=new Set(fullCtnItems.map(e=>e.item)).size>1;
      let chipClass=isOpen||isPending?'opened':'';
      if(isMultiChip)chipClass+=' multi-style';
      const checkClass=isOpen||isPending?'checked':'';
      const checkStyle=isPending&&!isOpen?'background:#e8f5e9;border-color:#4caf50;color:#2e7d32':'';
      return `<div class="ctn-chip ${chipClass}">
        <div class="chip-check ${checkClass}" style="${checkStyle}" onclick="toggleCTN('${ctn}')">${isOpen||isPending?'✓':''}</div>
        <span class="chip-name">${ctn}</span>
        ${colors?`<span class="chip-color">${colors}</span>`:''}
        ${isMultiChip?`<span class="chip-multi-icon" title="Multi-style carton">⚠</span>`:''}
      </div>`;
    }).join('')+'</div>';
  }
  return html+'</div>';
}

function openStatsPanel(type){
  const entries=getCurrentEntries();
  const panel=document.getElementById('stats-panel');
  const title=document.getElementById('stats-panel-title');
  const list=document.getElementById('stats-panel-list');
  const exportBtn=document.getElementById('stats-panel-export-btn');

  if(type==='opened'){
    if(exportBtn)exportBtn.style.display='none';
    const ctnMap=groupByCTN(entries);
    const openedList=Object.keys(ctnMap).filter(c=>openedCtns[c]).sort();
    title.textContent='📂 Opened Cartons — '+openedList.length+' cartons';
    if(openedList.length===0){
      list.innerHTML='<div class="no-results">No cartons opened yet</div>';
    } else {
      list.innerHTML=openedList.map(ctn=>{
        const items=ctnMap[ctn];
        const totalQty=items.reduce((s,i)=>s+i.qty,0);
        const names=[...new Set(items.map(i=>i.styleName||i.item))].join(' · ');
        return `<div class="variant-row">
          <span class="variant-name">${ctn}</span>
          <span class="variant-color">${names}</span>
          <span class="variant-qty">${totalQty} pcs</span>
        </div>`;
      }).join('');
    }
    panel.className='stats-panel open';
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }

  if(exportBtn)exportBtn.style.display='';

  // Filter by type
  const filtered=entries.filter(e=>type==='kids'?e.item.startsWith('LADD'):e.item.startsWith('ADD'));
  
  // Group by item+color
  const groups={};
  filtered.forEach(e=>{
    const key=e.item+'|||'+e.color;
    if(!groups[key])groups[key]={item:e.item,styleName:e.styleName,color:e.color,qty:0};
    groups[key].qty+=e.qty;
  });
  
  const rows=Object.values(groups).sort((a,b)=>a.styleName.localeCompare(b.styleName)||a.color.localeCompare(b.color));
  
  title.textContent=(type==='kids'?'👧 Kids Styles':'👩 Women Styles')+' — '+rows.length+' variants';
  
  list.innerHTML=rows.map(r=>`
    <div class="variant-row">
      <span class="variant-name">${r.styleName||r.item}</span>
      <span class="variant-color">${r.color}</span>
      <span class="variant-code">${r.item}</span>
      <span class="variant-qty">${r.qty} pcs</span>
    </div>`).join('');
  
  panel.className='stats-panel open';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeStatsPanel(){
  document.getElementById('stats-panel').className='stats-panel';
}

function exportToExcel(data, filename){
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  // Auto column widths
  const cols = Object.keys(data[0]||{}).map(k=>({wch:Math.max(k.length,15)}));
  ws['!cols']=cols;
  XLSX.writeFile(wb, filename+'.xlsx');
}

function exportCurrentView(){
  const entries=getCurrentEntries();
  if(entries.length===0){notify('אין נתונים לייצוא','error');return;}
  const ctnMap=groupByCTN(entries);
  const itemMap=groupByItem(entries);
  const name=shipments[activeShipment]?.name||'shipment';

  // Build a filename suffix reflecting the active view
  const suffixParts=[];
  if(prefixFilter)suffixParts.push(prefixFilter);
  if(categoryFilter==='women')suffixParts.push('women');
  if(categoryFilter==='kids')suffixParts.push('kids');
  if(multiStyleFilter)suffixParts.push('multistyle');
  if(searchQuery)suffixParts.push('search');
  const suffix=suffixParts.length?('_'+suffixParts.join('_')):'';

  const rows=[];

  // STYLE search mode -> export the styles currently shown
  if(searchMode==='item'&&searchQuery){
    const q=searchQuery.toLowerCase();
    let matches=Object.entries(itemMap).filter(([item,v])=>item.toLowerCase().includes(q)||v.styleName.toLowerCase().includes(q));
    if(categoryFilter!=='all')matches=matches.filter(([item])=>categoryMatch(item));
    matches.forEach(([item,data])=>{
      data.entries.forEach(e=>{
        rows.push({
          'Carton': e.ctn,
          'Style Code': e.item,
          'Style Name': e.styleName,
          'Color': e.color,
          'Sizes': Object.entries(e.sizes).map(([s,q])=>s+':'+q).join(' '),
          'Qty': e.qty,
          'Status': openedCtns[e.ctn]?'Opened':'Pending'
        });
      });
    });
    if(rows.length===0){notify('אין נתונים לייצוא בתצוגה הנוכחית','error');return;}
    exportToExcel(rows,name+'_styles'+suffix);
    notify('✓ יוצאו '+rows.length+' שורות (תצוגה נוכחית)');
    return;
  }

  // CARTON mode -> mirror EXACTLY the visible carton list (same filters as the screen)
  let ctnsToShow=Object.keys(ctnMap).sort();
  if(prefixFilter)ctnsToShow=ctnsToShow.filter(c=>c.toUpperCase().startsWith(prefixFilter.toUpperCase()));
  if(searchQuery&&searchMode==='ctn')ctnsToShow=ctnsToShow.filter(c=>c.toLowerCase().includes(searchQuery.toLowerCase()));
  if(categoryFilter!=='all')ctnsToShow=ctnsToShow.filter(c=>ctnMap[c].some(e=>categoryMatch(e.item)));
  if(multiStyleFilter)ctnsToShow=ctnsToShow.filter(c=>isMultiStyleCarton(ctnMap[c]));

  ctnsToShow.forEach(ctn=>{
    const items=ctnMap[ctn];
    const styleCount=new Set(items.map(i=>i.item)).size;
    items.forEach(item=>{
      rows.push({
        'Carton': ctn,
        'Style Code': item.item,
        'Style Name': item.styleName,
        'Color': item.color,
        'Sizes': Object.entries(item.sizes).map(([s,q])=>s+':'+q).join(' '),
        'Qty': item.qty,
        'Styles in Carton': styleCount,
        'Status': openedCtns[ctn]?'Opened':'Pending'
      });
    });
  });

  if(rows.length===0){notify('אין נתונים לייצוא בתצוגה הנוכחית','error');return;}
  exportToExcel(rows,name+'_cartons'+suffix);
  notify('✓ יוצאו '+rows.length+' שורות מ-'+ctnsToShow.length+' קרטונים (תצוגה נוכחית)');
}

function exportDrops(){
  const completed=getItemsWithDropDates();

  // Group by date
  const byDate={};
  completed.forEach(({item,data,shipNames})=>{
    const date=dropDates[fkey(item)];
    if(!date)return;
    if(!byDate[date])byDate[date]=[];
    byDate[date].push({item,data,shipNames});
  });

  const dates=Object.keys(byDate).sort();
  if(dates.length===0){notify('אין פריטי Drop לייצוא','error');return;}

  const womenRows=[];
  const kidsRows=[];

  dates.forEach(date=>{
    const dateLabel=formatDate(date);
    const items=byDate[date];
    const women=items.filter(({item})=>!item.startsWith('LADD'));
    const kids=items.filter(({item})=>item.startsWith('LADD'));

    women.forEach(({item,data,shipNames})=>{
      const colors=[...new Set(data.entries.map(e=>e.color).filter(Boolean))].sort();
      womenRows.push({
        'Drop Date': dateLabel,
        'Style Code': item,
        'Style Name': data.styleName||'',
        'Colors': colors.join(', '),
        'Shipment': (shipNames||[]).join(', ')
      });
    });

    kids.forEach(({item,data,shipNames})=>{
      const colors=[...new Set(data.entries.map(e=>e.color).filter(Boolean))].sort();
      kidsRows.push({
        'Drop Date': dateLabel,
        'Style Code': item,
        'Style Name': data.styleName||'',
        'Colors': colors.join(', '),
        'Shipment': (shipNames||[]).join(', ')
      });
    });
  });

  const wb=XLSX.utils.book_new();

  if(womenRows.length>0){
    const ws=XLSX.utils.json_to_sheet(womenRows);
    const cols=Object.keys(womenRows[0]).map(k=>({wch:Math.max(k.length,18)}));
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,'👩 Women');
  }
  if(kidsRows.length>0){
    const ws=XLSX.utils.json_to_sheet(kidsRows);
    const cols=Object.keys(kidsRows[0]).map(k=>({wch:Math.max(k.length,18)}));
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,'👧 Kids');
  }
  if(wb.SheetNames.length===0){notify('אין פריטי Drop לייצוא','error');return;}

  XLSX.writeFile(wb,'drops_export.xlsx');
  const total=womenRows.length+kidsRows.length;
  notify('✓ יוצאו '+total+' פריטים ('+womenRows.length+' נשים · '+kidsRows.length+' ילדים)');
}

function exportLocations(){
  const completed=getCompletedItems();
  const rows=[];
  completed.forEach(([item,data])=>{
    const colors=[...new Set(data.entries.map(e=>e.color).filter(Boolean))].sort();
    colors.forEach(color=>{
      const key=fkey(item)+'_'+fkey(color);
      rows.push({
        'Style Code': item,
        'Style Name': data.styleName,
        'Color': color,
        'Total Cartons': [...data.ctns].length,
        'Location': locations[key]||''
      });
    });
  });
  if(rows.length===0){notify('No locations to export','error');return;}
  exportToExcel(rows,'storage_locations');
  notify('✓ Exported '+rows.length+' rows!');
}

function exportStatsPanel(){
  const entries=getCurrentEntries();
  const title=document.getElementById('stats-panel-title').textContent;
  const isKids=title.includes('Kids');
  const filtered=entries.filter(e=>isKids?e.item.startsWith('LADD'):e.item.startsWith('ADD'));
  const groups={};
  filtered.forEach(e=>{
    const key=e.item+'|||'+e.color;
    if(!groups[key])groups[key]={item:e.item,styleName:e.styleName,color:e.color,qty:0};
    groups[key].qty+=e.qty;
  });
  const rows=Object.values(groups).sort((a,b)=>a.styleName.localeCompare(b.styleName)).map(r=>({
    'Style Name': r.styleName||r.item,
    'Color': r.color,
    'Style Code': r.item,
    'Total Qty': r.qty
  }));
  if(rows.length===0){notify('No data to export','error');return;}
  exportToExcel(rows,(isKids?'kids':'women')+'_styles');
  notify('✓ Exported '+rows.length+' variants!');
}

async function removeFromStorage(item){
  const key=fkey(item);
  await db.ref('completedItems/'+key).remove();
  notify('✓ Removed from Storage Locations');
  renderLocations();
}

function searchAllShipments(){
  if(!searchQuery.trim())return;
  const q=searchQuery.trim().toLowerCase();
  const listEl=document.getElementById('main-list');
  const countEl=document.getElementById('list-count');
  const allResults=[];

  Object.entries(shipments).forEach(([id,ship])=>{
    const entries=ship.entries||[];
    if(searchMode==='ctn'){
      const ctnMap=groupByCTN(entries);
      Object.entries(ctnMap).filter(([ctn,items])=>ctn.toLowerCase().includes(q)&&(!multiStyleFilter||isMultiStyleCarton(items))).forEach(([ctn,items])=>{
        allResults.push({type:'ctn',ctn,items,shipName:ship.name});
      });
    } else {
      const itemMap=groupByItem(entries);
      Object.entries(itemMap).filter(([item,v])=>item.toLowerCase().includes(q)||v.styleName.toLowerCase().includes(q)).forEach(([item,data])=>{
        allResults.push({type:'item',item,data,shipName:ship.name});
      });
    }
  });

  document.getElementById('search-all-status').textContent=allResults.length+' results across all shipments';
  countEl.textContent=allResults.length+' results across all shipments';

  if(allResults.length===0){listEl.innerHTML='<div class="no-results">No results found across all shipments</div>';return;}

  if(searchMode==='ctn'){
    listEl.innerHTML=allResults.map(r=>renderCTNCard(r.ctn,r.items,r.shipName)).join('');
  } else {
    listEl.innerHTML=allResults.map(r=>renderItemCard(r.item,r.data,r.shipName)).join('');
  }
}

function markFromParent(btn,val){
  const div=btn.closest('.item-actions');
  const item=div.dataset.item;
  const ctns=div.dataset.ctns.split(',').filter(Boolean);
  const updates={};
  ctns.forEach(ctn=>{updates['opened/'+ctn.replace(/[.#$\/\[\]]/g,'-')]=val||null;});
  db.ref().update(updates);
}

async function doneFromParent(btn){
  const div=btn.closest('.item-actions');
  const item=div.dataset.item;
  const ctns=div.dataset.ctns.split(',').filter(Boolean);
  const updates={};
  ctns.forEach(ctn=>{updates['opened/'+ctn.replace(/[.#$\/\[\]]/g,'-')]=true;});
  await db.ref().update(updates);
  const key=item.replace(/[.#$\/\[\]]/g,'-');
  await db.ref('completedItems/'+key).set(true);
  notify('✓ '+item+' marked as done — sent to Storage Locations!');
}

// ===== Anonymous auth gate (enables locked Firebase Rules: auth != null) =====
// Data listeners only attach AFTER we have an authenticated (anonymous) session,
// so that once the Rules are locked the app still reads/writes normally.
let _dataListenersStarted=false;
function startDataListeners(){
  if(_dataListenersStarted)return;
  _dataListenersStarted=true;

  db.ref('shipments').on('value',snap=>{
    const data=snap.val()||{};
    Object.keys(data).forEach(id=>{if(data[id].entries&&!Array.isArray(data[id].entries))data[id].entries=Object.values(data[id].entries);});
    shipments=data;
    const keys=Object.keys(shipments);
    if(keys.length>0&&(!activeShipment||!shipments[activeShipment]))activeShipment=keys[keys.length-1];
    if(keys.length===0)activeShipment=null;
    render();
  });

  db.ref('opened').on('value',snap=>{
    const raw=snap.val()||{};
    openedCtns={};
    Object.entries(raw).forEach(([k,v])=>{if(v)openedCtns[k]=true;});
    render();
  });

  db.ref('locations').on('value',snap=>{
    locations=snap.val()||{};
  });

  db.ref('completedItems').on('value',snap=>{
    completedItems=snap.val()||{};
    render();
  });

  db.ref('dropDates').on('value',snap=>{
    dropDates=snap.val()||{};
    if(document.getElementById('page-locations').classList.contains('active'))renderLocations();
    if(document.getElementById('page-drops').classList.contains('active')){renderDrops();renderDropAddResults();}
    if(document.getElementById('page-online').classList.contains('active')){
      renderOnlineDateSelect();
      const sel=document.getElementById('online-date-select');
      if(sel&&sel.value)renderOnlineList(sel.value);
    }
  });

  db.ref('dropDateList').on('value',snap=>{
    dropDateList=snap.val()||{};
    if(document.getElementById('page-drops').classList.contains('active')){renderDrops();renderDropAddResults();}
  });

  db.ref('dropImages').on('value',snap=>{
    dropImages=snap.val()||{};
    if(document.getElementById('page-drops').classList.contains('active'))renderDrops();
  });

  db.ref('manualItems').on('value',snap=>{
    manualItems=snap.val()||{};
    if(document.getElementById('page-drops').classList.contains('active')){renderDrops();renderDropAddResults();}
  });

  db.ref('onlineUploaded').on('value',snap=>{
    onlineUploaded=snap.val()||{};
    if(document.getElementById('page-online').classList.contains('active')){
      const sel=document.getElementById('online-date-select');
      if(sel&&sel.value)renderOnlineList(sel.value);
      renderOnlineDateSelect();
    }
  });
}

// Start listeners as soon as we have an authenticated session
auth.onAuthStateChanged(user=>{
  if(user)startDataListeners();
});

// Sign in anonymously (transparent to the user) so the locked Rules are satisfied
auth.signInAnonymously().catch(err=>{
  console.error('Anonymous auth failed',err);
  notify('שגיאת התחברות לשרת — נסי לרענן את הדף','error');
});

function updateScrollButtons(){
  const top=document.getElementById('scroll-top-btn');
  const bottom=document.getElementById('scroll-bottom-btn');
  if(!top||!bottom)return;
  top.className='scroll-top'+(window.scrollY>300?' visible':'');
  const atBottom=(window.innerHeight+window.scrollY)>=document.body.scrollHeight-40;
  const scrollable=document.body.scrollHeight>window.innerHeight+150;
  bottom.className='scroll-bottom'+(scrollable&&!atBottom?' visible':'');
}
window.addEventListener('scroll',updateScrollButtons);
window.addEventListener('resize',updateScrollButtons);
